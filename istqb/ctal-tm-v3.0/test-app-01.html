  {id:49,lo:'LO 2.2.3',k:'K2',pts:1,multi:false,text:'Delphi Ziel?',options:['Chef entscheidet','Konsens','Schnell','Keine Schätzung'],answer:[1],explanation:'Konsens.'},
  {id:50,lo:'LO 3.2.2',k:'K4',pts:3,multi:false,text:'Bestes Business Argument?',options:['Spaß','Kostenreduktion','Pflicht','Mehr Leute'],answer:[1],explanation:'ROI zählt.'}

// ==========================
// APP STATE
// ==========================
let current = 0;
let answers = {};
let showResults = false;

// ==========================
// RENDER
// ==========================
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (showResults) return renderResults();

  const q = questions[current];

  const div = document.createElement('div');
  div.className = 'question';

  div.innerHTML = `
    <div class="meta">Frage ${current+1} / ${questions.length} | ${q.k} | ${q.pts} Punkte</div>
    <p>${q.text}</p>
    ${q.options.map((opt,i)=>`
      <div>
        <label>
          <input type="${q.multi?'checkbox':'radio'}"
                 name="q${q.id}"
                 ${answers[q.id]?.includes(i)?'checked':''}
                 onchange="selectAnswer(${q.id}, ${i}, ${q.multi})">
          ${opt}
        </label>
      </div>
    `).join('')}
  `;

  app.appendChild(div);

  // NAV
  const nav = document.createElement('div');

  nav.innerHTML = `
    <div class="progress">Fortschritt: ${Object.keys(answers).length} / ${questions.length}</div>

    <button onclick="prev()">⬅ Zurück</button>
    <button onclick="next()">Weiter ➡</button>
    <button class="success" onclick="finish()">Abgeben</button>
  `;

  app.appendChild(nav);
}

// ==========================
// ANSWER HANDLING
// ==========================
function selectAnswer(qid, index, multi) {
  if (!answers[qid]) answers[qid] = [];

  if (multi) {
    if (answers[qid].includes(index)) {
      answers[qid] = answers[qid].filter(i => i !== index);
    } else {
      answers[qid].push(index);
    }
  } else {
    answers[qid] = [index];
  }
}

// ==========================
// NAVIGATION
// ==========================
function next() {
  if (current < questions.length - 1) current++;
  render();
}
function prev() {
  if (current > 0) current--;
  render();
}

// ==========================
// RESULT CALC
// ==========================
function finish() {
  showResults = true;
  render();
}

function renderResults() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  let score = 0;
  let max = 0;

  questions.forEach(q => {
    max += q.pts;
    const user = answers[q.id] || [];
    const correct = JSON.stringify(user.sort()) === JSON.stringify(q.answer.sort());

    if (correct) score += q.pts;
  });

  const percent = Math.round((score / max) * 100);
  const passed = percent >= 65;

  const summary = document.createElement('div');
  summary.innerHTML = `
    <h2>Ergebnis</h2>
    <p><b>Punkte:</b> ${score} / ${max}</p>
    <p><b>Prozent:</b> ${percent}%</p>
    <p><b>Status:</b> <span class="${passed?'correct':'wrong'}">${passed?'BESTANDEN':'NICHT BESTANDEN'}</span></p>
    <button onclick="review()">Antworten ansehen</button>
  `;
  app.appendChild(summary);
}

function review() {
  const app = document.getElementById('app');
  app.innerHTML = '<h2>Review</h2>';

  questions.forEach(q => {
    const user = answers[q.id] || [];
    const correct = JSON.stringify(user.sort()) === JSON.stringify(q.answer.sort());

    const div = document.createElement('div');
    div.className = 'question';

    div.innerHTML = `
      <p><b>Frage ${q.id}:</b> ${q.text}</p>
      <p class="${correct?'correct':'wrong'}">
        Deine Antwort: ${user.map(i=>q.options[i]).join(', ') || '—'}
      </p>
      <p class="correct">
        Richtige Antwort: ${q.answer.map(i=>q.options[i]).join(', ')}
      </p>
      <p><i>${q.explanation}</i></p>
    `;

    app.appendChild(div);
  });
}

// ==========================
render();
</script>
